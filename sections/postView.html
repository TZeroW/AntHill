<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntHill</title>
    <link rel="stylesheet" href="../styles/postView.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="../assets/general/Logo-ant.png" alt="AntHill Logo" />
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar en la colonia..." />
        </div>
        <div class="user-actions">
            <span><img src="../assets/general/bell.svg" alt="Notificaciones" /></span>
            <div class="user-profile">
                <span id="header-user-name">Invitado</span>
                <img id="header-user-pfp" src="../assets/general/pfp.webp" alt="Perfil" />
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="../index.html">
                    <img src="../assets/general/home.svg" alt="" />
                    <span>Home</span>
                </a>
                <a href="#" class="active">
                    <img src="../assets/general/compass.svg" alt="" />
                    <span>Explore</span>
                </a>
                <a href="profileView.html">
                    <img src="../assets/general/profile.svg" alt="" />
                    <span>Profile</span>
                </a>
                <a href="login.html">
                    <img src="../assets/general/log_out.svg" alt="" />
                    <span>Log out</span>
                </a>
                <a href="settings.html">
                    <img src="../assets/general/settings.svg" alt="" />
                    <span>Settings</span>
                </a>
            </nav>
            <button class="btn-create">
                <span style="margin-right: 8px; font-size: 1.2rem">+</span>
                Crear Post
            </button>
        </aside>

        <main class="post-container">
            <!-- Botón para volver -->
            <div class="back-button">
                <a href="../index.html"><i class="bi bi-arrow-left"></i> Volver</a>
            </div>

            <!-- El Post Principal -->
            <article class="post-card" id="main-post-container">
                <p style="text-align: center; padding: 20px;">Cargando post...</p>
                <!-- Se llenará dinámicamente -->
            </article>

            <!-- Sección de Comentarios -->
            <section class="comments-section" style="display: none;">
                <div class="comment-input-box">
                    <img id="comment-pfp" src="../assets/general/pfp.webp" alt="Your PFP" class="mini-pfp" />
                    <div class="input-wrapper">
                        <textarea id="comment-textarea" placeholder="Escribe tu comentario..."></textarea>
                        <div class="input-actions">
                            <button class="btn-comment-submit" id="btn-submit-comment">Responder</button>
                        </div>
                    </div>
                </div>

                <div class="comments-list" id="comments-list">
                    <!-- Los comentarios aparecerán aquí -->
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../scripts/postInteractions.js"></script>
    <script type="module" src="../scripts/postViewManager.js"></script>
</body>

</html>
