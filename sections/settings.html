<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - AntHill</title>
    <link rel="stylesheet" href="../styles/homeStyles.css">
    <link rel="stylesheet" href="../styles/settings.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="../assets/general/Logo-ant.png" alt="AntHill Logo">
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar en la colonia...">
        </div>
        <div class="user-actions">
            <span><img src="../assets/general/bell.svg" alt="Notificaciones"></span>
            <div class="user-profile">
                <span id="header-user-name">Invitado</span>
                <img id="header-user-pfp" src="../assets/general/pfp.webp" alt="Perfil">
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="../index.html">
                    <img src="../assets/general/home.svg" alt="">
                    <span>Home</span>
                </a>
                <a href="colonias.html">
                    <img src="../assets/general/compass.svg" alt="">
                    <span>Explore</span>
                </a>
                <a href="profileView.html">
                    <img src="../assets/general/profile.svg" alt="">
                    <span>Profile</span>
                </a>
                <a href="#" class="active">
                    <img src="../assets/general/settings.svg" alt="">
                    <span>Settings</span>
                </a>
                <a href="login.html">
                    <img src="../assets/general/log_out.svg" alt="">
                    <span>Log out</span>
                </a>
            </nav>
        </aside>

        <main class="feed-center">
            <div class="settings-box">
                <h2>Personalizar Perfil</h2>
                <p class="settings-desc">Cambia tu apariencia en la colonia.</p>

                <div class="settings-form">
                    <div class="form-group">
                        <label>Nombre de Usuario</label>
                        <input type="text" id="username-input" placeholder="Tu nuevo nombre">
                        <small>Este nombre aparecerá en tus posts y perfil.</small>
                    </div>

                    <div class="form-group">
                        <label>Foto de Perfil (URL)</label>
                        <div class="pfp-preview-container">
                            <img id="pfp-preview" src="../assets/general/pfp.webp" alt="Vista previa">
                            <input type="text" id="pfp-url-input" placeholder="https://ejemplo.com/mi-foto.jpg">
                        </div>
                        <small>Pega la URL de una imagen para actualizar tu avatar.</small>
                    </div>

                    <button id="btn-save-settings" class="btn-post">Guardar Cambios</button>
                    <div id="settings-message"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../scripts/settingsManager.js"></script>
</body>

</html>
