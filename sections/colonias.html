<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntHill</title>
    <link rel="stylesheet" href="../styles/colonias.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="../assets/general/Logo-ant.png" alt="AntHill Logo" />
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="global-search" placeholder="Buscar en la colonia..." />
        </div>
        <div class="user-actions">
            <div class="user-profile">
                <span id="header-user-name">Invitado</span>
                <img id="header-user-pfp" src="../assets/general/pfp.webp" alt="Perfil" />
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="../index.html">
                    <img src="../assets/general/home.svg" alt="" />
                    <span>Home</span>
                </a>
                <a href="#" class="active">
                    <img src="../assets/general/compass.svg" alt="" />
                    <span>Explore</span>
                </a>
                <a href="profileView.html">
                    <img src="../assets/general/profile.svg" alt="" />
                    <span>Profile</span>
                </a>
                <a href="settings.html">
                    <img src="../assets/general/settings.svg" alt="" />
                    <span>Settings</span>
                </a>
                <a href="login.html">
                    <img src="../assets/general/log_out.svg" alt="" />
                    <span>Log out</span>
                </a>
            </nav>
            <button class="btn-create">
                <span style="margin-right: 8px; font-size: 1.2rem">+</span>
                Crear Colonia
            </button>
        </aside>

        <main class="colonias-container">
            <!-- El contenido se cargara dinamicamente con coloniaManager -->
            <div class="colonias-header" id="colonias-list">
                <p>Cargando colonias...</p>
            </div>
        </main>
    </div>

    <!-- Esqueleto del Menú para Crear Colonia (Solo estructura, el usuario pondrá el estilo) -->
    <div id="modal-crear-colonia" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Fundar Nueva Colonia</h2>
            <div class="modal-body">
                <input type="text" id="new-colonia-name" class="modal-input"
                    placeholder="Nombre de la colonia (ej. Gaming)">
                <textarea id="new-colonia-desc" class="modal-textarea" placeholder="Descripción breve..."></textarea>
                <input type="text" id="new-colonia-img" class="modal-input" placeholder="URL de la imagen (opcional)">
                <div class="modal-actions">
                    <button id="btn-confirm-colonia" class="btn btn-primary">Fundar</button>
                    <button id="btn-cancel-colonia" class="btn btn-secondary">Cancelar</button>
                </div>
            </div>
            <p id="colonia-error-msg" class="error-message"></p>
        </div>
    </div>

    <script type="module" src="../scripts/coloniaManager.js"></script>
</body>

</html>
