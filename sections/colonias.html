<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntHill</title>
    <link rel="stylesheet" href="../styles/colonias.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="../assets/general/Logo-ant.png" alt="AntHill Logo" />
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar en la colonia..." />
        </div>
        <div class="user-actions">
            <span><img src="../assets/general/bell.svg" alt="Notificaciones" /></span>
            <div class="user-profile">
                <span>TZeroW</span>
                <img src="../assets/general/pfp-lol.jpg" alt="Perfil" />
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="../index.html">
                    <img src="../assets/general/home.svg" alt="" />
                    <span>Home</span>
                </a>
                <a href="#" class="active">
                    <img src="../assets/general/compass.svg" alt="" />
                    <span>Explore</span>
                </a>
                <a href="profileView.html">
                    <img src="../assets/general/profile.svg" alt="" />
                    <span>Profile</span>
                </a>
                <a href="#">
                    <img src="../assets/general/settings.svg" alt="" />
                    <span>Settings</span>
                </a>
                <a href="sections/login.html">
                    <img src="../assets/general/log_out.svg" alt="" />
                    <span>Log out</span>
                </a>
            </nav>
            <button class="btn-create">
                <span style="margin-right: 8px; font-size: 1.2rem">+</span>
                Crear Post
            </button>
        </aside>

        <main class="colonias-container">
            <div class="colonias-header">
                <div class="colonia-card">
                    <div class="card-image">
                        <img src="../assets/general/pfp-lol.jpg" alt="colonia" />
                    </div>
                    <div class="card-content">
                        <h2>Anime</h2>
                        <p class="description">Un lugar donde pasan cosas sobre animes</p>
                        <button class="btn-join">Unirse</button>
                    </div>
                </div>
                <div class="colonia-card">
                    <div class="card-image">
                        <img src="../assets/general/cont-pfp.jpg" alt="colonia" />
                    </div>
                    <div class="card-content">
                        <h2>Memes</h2>
                        <p class="description">Un lugar donde pasan cosas sobre memes</p>
                        <button class="btn-join">Unirse</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
