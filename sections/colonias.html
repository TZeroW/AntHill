<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntHill</title>
    <link rel="stylesheet" href="../styles/colonias.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="../assets/general/Logo-ant.png" alt="AntHill Logo" />
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar en la colonia..." />
        </div>
        <div class="user-actions">
            <span><img src="../assets/general/bell.svg" alt="Notificaciones" /></span>
            <div class="user-profile">
                <span>TZeroW</span>
                <img src="../assets/general/pfp-lol.jpg" alt="Perfil" />
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="../index.html">
                    <img src="../assets/general/home.svg" alt="" />
                    <span>Home</span>
                </a>
                <a href="#" class="active">
                    <img src="../assets/general/compass.svg" alt="" />
                    <span>Explore</span>
                </a>
                <a href="profileView.html">
                    <img src="../assets/general/profile.svg" alt="" />
                    <span>Profile</span>
                </a>
                <a href="settings.html">
                    <img src="../assets/general/settings.svg" alt="" />
                    <span>Settings</span>
                </a>
                <a href="sections/login.html">
                    <img src="../assets/general/log_out.svg" alt="" />
                    <span>Log out</span>
                </a>
            </nav>
            <button class="btn-create">
                <span style="margin-right: 8px; font-size: 1.2rem">+</span>
                Crear Colonia
            </button>
        </aside>

        <main class="colonias-container">
            <!-- El contenido se cargara dinamicamente con coloniaManager -->
            <div class="colonias-header" id="colonias-list">
                <p>Cargando colonias...</p>
            </div>
        </main>
    </div>

    <!-- Esqueleto del Menú para Crear Colonia (Solo estructura, el usuario pondrá el estilo) -->
    <div id="modal-crear-colonia"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 400px; width: 90%;">
            <h2>Fundar Nueva Colonia</h2>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <input type="text" id="new-colonia-name" placeholder="Nombre de la colonia (ej. Gaming)"
                    style="padding: 10px;">
                <textarea id="new-colonia-desc" placeholder="Descripción breve..." style="padding: 10px;"></textarea>
                <input type="text" id="new-colonia-img" placeholder="URL de la imagen (opcional)"
                    style="padding: 10px;">

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-confirm-colonia" style="flex: 1; padding: 10px; cursor: pointer;">Fundar</button>
                    <button id="btn-cancel-colonia" style="flex: 1; padding: 10px; cursor: pointer;">Cancelar</button>
                </div>
            </div>
            <p id="colonia-error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <script type="module" src="../scripts/coloniaManager.js"></script>
</body>

</html>
