<!doctype html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Perfil - AntHill</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="../styles/profile.css">
      <!-- fontawesome para los iconos -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
      <!-- barra de navegacion -->
      <header class="top-nav">
            <div class="logo">
                  <img src="../assets/general/Logo-ant.png" alt="AntHill Logo">
                  <h1>AntHill</h1>
            </div>
            <div class="search-bar">
                  <input type="text" id="global-search" placeholder="Buscar en la colonia...">
            </div>
            <div class="user-actions">
                  <div class="user-profile">
                        <span id="header-user-name">Invitado</span>
                        <img id="header-user-pfp" src="../assets/general/pfp.webp" alt="Perfil">
                  </div>
            </div>
      </header>

      <div class="main-layout">

            <div class="profile-container">
                  <div class="content-grid">
                        <!-- barra lateral izquierda (Navegacion) -->
                        <aside class="sidebar-left">
                              <nav class="main-menu">
                                    <a href="../index.html">
                                          <img src="../assets/general/home.svg" alt="">
                                          <span>Home</span>
                                    </a>
                                    <a href="colonias.html">
                                          <img src="../assets/general/compass.svg" alt="">
                                          <span>Explore</span>
                                    </a>
                                    <a href="#" class="active">
                                          <img src="../assets/general/profile.svg" alt="">
                                          <span>Profile</span>
                                    </a>
                                    <a href="settings.html">
                                          <img src="../assets/general/settings.svg" alt="">
                                          <span>Settings</span>
                                    </a>
                                    <a href="#">
                                          <img src="../assets/general/log_out.svg" alt="">
                                          <span>Log out</span>
                                    </a>
                              </nav>
                        </aside>

                        <!-- Columna Central: Banner + Header + Feed -->
                        <div class="center-column">
                              <!-- Banner ahora dentro de la columna central -->
                              <div class="profile-banner"></div>

                              <div class="profile-header-wrapper">
                                    <!-- informacion de encabezado -->
                                    <div class="profile-header">
                                          <div class="profile-header-top">
                                                <div>
                                                      <img src="../assets/general/pfp-lol.jpg" alt="Perfil"
                                                            class="big-avatar">
                                                </div>
                                                <div class="botones-perfil">
                                                      <a href="settings.html" class="btn btn-secondary">Editar
                                                            perfil</a>
                                                </div>
                                          </div>

                                          <div class="user-details">
                                                <div class="name-badge-row">
                                                      <h1 class="perfilNombre"></h1>
                                                </div>
                                                <p class="user-handle">@TZerp</p>
                                          </div>
                                    </div>

                                    <!-- columna principal del feed -->
                                    <main class="feed-column">
                                          <div class="feed-tabs">
                                                <button class="feed-tab active">Publicaciones</button>
                                                <button class="feed-tab">Me gusta</button>
                                                <button class="feed-tab">Compartidos</button>
                                          </div>

                                          <div id="feed" class="posts-container">
                                                <!-- El contenido se muestra con JS -->
                                          </div>
                                    </main>
                              </div>
                        </div>

                        <!-- barra lateral derecha (Info) -->
                        <aside class="sidebar-right">
                              <!-- tarjeta sobre mi -->
                              <div class="card about-card">
                                    <h3 class="card-header"><span class="red-icon"><i
                                                      class="bi bi-info-circle"></i></span>
                                          Sobre mí</h3>
                                    <p class="bio-text">
                                          Me gusta el salamin con pan
                                    </p>
                                    <div class="bio-meta">
                                          <div class="meta-row"><i class="bi bi-globe-americas red-icon"></i>
                                                <span id="profile-location">Azcapotzalco, CDMX</span>
                                          </div>
                                          <div class="meta-row"><i class="bi bi-calendar2-heart red-icon"></i>
                                                <span id="profile-birthdate">algun dia</span>
                                          </div>
                                    </div>
                              </div>
                        </aside>
                  </div>
            </div>
      </div>
      </div>

      <!-- Scripts -->
      <script type="module" src="../scripts/postManager.js"></script>
      <script type="module" src="../scripts/postInteractions.js"></script>
      <script type="module" src="../scripts/profileManager.js"></script>
</body>

</html>
