<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AntHill</title>
    <link rel="stylesheet" href="styles/homeStyles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <header class="top-nav">
        <div class="logo">
            <img src="assets/general/Logo-ant.png" alt="AntHill Logo" />
            <h1>AntHill</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="global-search" placeholder="Buscar en la colonia..." />
        </div>
        <div class="user-actions">
            <div class="user-profile">
                <span id="header-user-name">Invitado</span>
                <img id="header-user-pfp" src="assets/general/none.jpg" alt="Perfil" />
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar-left">
            <nav class="main-menu">
                <a href="index.html" class="active">
                    <img src="assets/general/home.svg" alt="" />
                    <span>Home</span>
                </a>
                <a href="sections/colonias.html">
                    <img src="assets/general/compass.svg" alt="" />
                    <span>Explore</span>
                </a>
                <a href="sections/profileView.html">
                    <img src="assets/general/profile.svg" alt="" />
                    <span>Profile</span>
                </a>
                <a href="sections/settings.html">
                    <img src="assets/general/settings.svg" alt="" />
                    <span>Settings</span>
                </a>
                <a href="sections/login.html">
                    <img src="assets/general/log_out.svg" alt="" />
                    <span>Log out</span>
                </a>
            </nav>
        </aside>

        <main class="feed-center">
            <div class="create-post-box">
                <div class="cp-header">
                    <img id="post-box-pfp" src="assets/general/pfp.webp" alt="" class="mini-pfp" />
                    <input type="text" placeholder="¿Que esta pasando en la colonia?" />
                </div>
                <button class="btn-post">Publicar</button>
            </div>

            <!-- contenedor dinamico del feed -->
            <div id="feed">
                <!-- los posts se cargan aqui con JS -->
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="widget recommended-widget">
                <h3>Colonias Recomendadas</h3>
                <div id="recommended-list">
                    <p style="text-align: center; color: #666; font-size: 0.8rem; padding: 10px;">Cargando colonias...
                    </p>
                </div>
                <div class="show-more" style="cursor: pointer;" onclick="window.location.href='sections/colonias.html'">
                    Ver todas</div>
            </div>

            <div class="footer-links">
                <a href="#">Privacidad</a> · <a href="#">Terminos</a> ·
                <a href="#">Anuncios</a> · <span>© 2024 AntHill</span>
            </div>
        </aside>
    </div>

    <!-- script para cargar el feed -->
    <script type="module">
        import { cargarPosts, cargarPostsPorColonia, filtrarPosts } from "/scripts/posts.js";
        import { cargarRecomendados } from "/scripts/coloniaManager.js";
        import "/scripts/postManager.js";
        import "/scripts/postInteractions.js";

        // Cargar colonias recomendadas
        cargarRecomendados();

        // Buscador Global
        const searchBar = document.getElementById("global-search");
        if (searchBar) {
            searchBar.addEventListener("input", (e) => {
                filtrarPosts(e.target.value);
            });
        }

        // Actualizar UI del usuario
        const user = JSON.parse(localStorage.getItem("anthill_user"));
        if (user) {
            document.getElementById("header-user-name").textContent = user.name;
            if (user.pfp) {
                document.getElementById("header-user-pfp").src = user.pfp;
                document.getElementById("post-box-pfp").src = user.pfp;
            }
        }

        // Detectar si venimos de una colonia especifica
        const urlParams = new URLSearchParams(window.location.search);
        const coloniaActual = urlParams.get('colonia');

        if (coloniaActual) {
            cargarPostsPorColonia(coloniaActual);
            // Cambiar placeholder para indicar en qué colonia estamos
            const input = document.querySelector(".create-post-box input");
            if (input) input.placeholder = `Publicar en c/${coloniaActual}...`;
            // Guardar en window para que postManager lo sepa
            window.coloniaActual = coloniaActual;
        } else {
            cargarPosts();
        }
    </script>
</body>

</html>
